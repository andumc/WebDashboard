<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="icon" href="/dashboard.ico">
<style>
body { background:#1a1a1a; color:#f0f0f0; font-family:Arial; text-align:center; padding:60px; }
.box { background:#2a2a2a; max-width:420px; margin:0 auto; padding:30px; border-radius:12px; }
input { width:90%; padding:12px; margin-top:12px; border:1px solid #555; border-radius:8px; background:#111; color:white; }
button { margin-top:16px; padding:12px 18px; border:none; border-radius:8px; background:#ff9900; color:white; cursor:pointer; }
.error { color:#ff6b6b; margin-top:12px; }
</style>
</head>
<body>
<div class="box">
<h1>Dashboard Login</h1>
<form method="POST">
<input type="text" name="username" placeholder="Username" required><br>
<input type="password" name="password" placeholder="Password" required><br>
<button type="submit">Login</button>
</form>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
</div>
</body>
</html>
