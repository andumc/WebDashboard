<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ server.name }}</title>
<link rel="icon" href="/dashboard.ico">
<style>
body{background:#1a1a1a;color:#f0f0f0;font-family:monospace;padding:30px}textarea{width:100%;height:300px;background:black;color:white;padding:12px;border-radius:6px;border:1px solid #444}input{width:80%;padding:10px;margin-top:10px;background:#2a2a2a;color:white;border:1px solid #555;border-radius:6px}button{padding:10px 16px;margin-top:10px;margin-left:5px;border:none;border-radius:6px;cursor:pointer;background:#4CAF50;color:white}a{color:lightblue;text-decoration:none}.section{margin-top:30px}
</style>
</head>
<body>
<h1>{{ server.name }} - Management</h1>
<a href="/dashboard">Back</a>
<div class="section"><h2>Console</h2><textarea id="console" readonly></textarea><br><input type="text" id="cmd"><button onclick="sendCmd()">Send</button></div>
<div class="section"><h2>Properties</h2><textarea id="properties"></textarea><br><button onclick="saveProperties()">Save</button></div>
<script>
async function loadConsole(){const r=await fetch('/console/{{ server_id }}');const d=await r.json();document.getElementById('console').value=d.log||'';}
async function sendCmd(){let c=document.getElementById('cmd').value.trim();if(!c)return;await fetch('/send/{{ server_id }}',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cmd:c})});document.getElementById('cmd').value='';setTimeout(loadConsole,500);}
async function loadProperties(){const r=await fetch('/properties/{{ server_id }}');const d=await r.json();document.getElementById('properties').value=d.content||'';}
async function saveProperties(){await fetch('/properties/{{ server_id }}',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:document.getElementById('properties').value})});alert('Saved');}
setInterval(loadConsole,2000);loadConsole();loadProperties();
</script>
</body>
</html>
