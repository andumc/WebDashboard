<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="icon" href="/dashboard.ico">
<style>
body{background:#1a1a1a;color:white;font-family:Arial;padding:30px}.card{background:#2a2a2a;padding:18px;border-radius:12px;margin:12px 0}a{color:#ff9900;text-decoration:none}.topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}.add-server-btn,.modal button.primary{display:inline-block;background:#ff9900;color:#1a1a1a;font-weight:bold;padding:10px 14px;border:0;border-radius:10px;cursor:pointer}.add-server-btn:hover,.modal button.primary:hover{background:#ffb84d;color:#1a1a1a}.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);align-items:center;justify-content:center;z-index:10}.modal{background:#242424;border:1px solid #3a3a3a;border-radius:16px;padding:22px;width:min(680px,92vw);box-shadow:0 24px 80px rgba(0,0,0,.5)}.modal h2{margin-top:0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:flex;flex-direction:column;gap:6px}.field.full{grid-column:1/-1}label{color:#ddd;font-size:14px}input,select{background:#151515;color:white;border:1px solid #444;border-radius:10px;padding:10px}.actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}.ghost{background:#333;color:white;border:1px solid #555;border-radius:10px;padding:10px 14px;cursor:pointer}.hint{color:#aaa;font-size:13px}.msg{margin-top:12px;color:#ffb84d;white-space:pre-wrap}@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1>Web Dashboard</h1>
<div class="topbar">
<button class="add-server-btn" onclick="openAddServerModal()">+ Add Server</button>
<a href="/files">Open File Browser</a>
<span>|</span>
<a href="/logout">Logout</a>
</div>
{% for sid, server in servers.items() %}
<div class="card"><a href="/server/{{ sid }}">{{ server.name }}</a></div>
{% endfor %}

<div id="addServerBackdrop" class="modal-backdrop">
  <div class="modal">
    <h2>Add Server</h2>
    <p class="hint">Legt den Server in <code>servers.txt</code> an und erstellt den Ordner direkt lokal oder via Agent.</p>
    <form id="addServerForm" class="grid">
      <div class="field"><label for="serverName">Name</label><input id="serverName" name="name" placeholder="Survival 1" required></div>
      <div class="field"><label for="serverId">ID</label><input id="serverId" name="id" placeholder="survival1" required></div>
      <div class="field full"><label for="serverPath">Path</label><input id="serverPath" name="path" placeholder="C:\Users\Administrator\Desktop\MC Server\Survival 1"></div>
      <div class="field"><label for="target">Ziel</label><select id="target" name="target"><option value="local">Local Dashboard Server</option>{% for agent in agents %}<option value="{{ agent.ip }}:{{ agent.port }}">Agent: {{ agent.name or agent.ip }} ({{ agent.ip }}:{{ agent.port }})</option>{% endfor %}</select></div>
      <div class="field"><label for="installerId">Installer</label><select id="installerId" name="installer_id"><option value="">Keiner / nur Ordner</option>{% for installer in installers %}<option value="{{ installer.id }}">{{ installer.name }}</option>{% endfor %}</select></div>
      <div class="field"><label for="serverType">Typ</label><select id="serverType" name="type"><option value="paper">Paper / Minecraft Server</option><option value="velocity">Velocity Proxy</option></select></div>
      <div class="field"><label for="startBat">Start Script</label><input id="startBat" name="start_bat" value="start.bat"></div>
      <div class="field"><label for="mcPort">Minecraft Port</label><input id="mcPort" name="minecraft_port" type="number" value="25565" required></div>
      <div class="field"><label for="rconPort">RCON Port</label><input id="rconPort" name="rcon_port" type="number" value="25575" required></div>
      <div class="field"><label for="rconName">RCON Name</label><input id="rconName" name="rcon_name" placeholder="survival1-rcon"></div>
      <div class="field"><label for="rconPassword">RCON Passwort</label><input id="rconPassword" name="rcon_password" placeholder="change-me" required></div>
      <div class="field"><label for="mcHost">Minecraft Host</label><input id="mcHost" name="minecraft_host" value="127.0.0.1"></div>
      <div class="field"><label for="rconHost">RCON Host</label><input id="rconHost" name="rcon_host" value="127.0.0.1"></div>
    </form>
    <div class="actions"><button class="ghost" onclick="closeAddServerModal()">Cancel</button><button class="primary" onclick="submitAddServer()">Create Server</button></div>
    <div id="addServerMsg" class="msg"></div>
  </div>
</div>
<script>
const backdrop=document.getElementById('addServerBackdrop'),form=document.getElementById('addServerForm'),msg=document.getElementById('addServerMsg');
function slugify(v){return v.toLowerCase().trim().replace(/[^a-z0-9_-]+/g,'-').replace(/^-+|-+$/g,'')}
function openAddServerModal(){backdrop.style.display='flex';msg.textContent='';document.getElementById('serverName').focus()}
function closeAddServerModal(){backdrop.style.display='none'}
document.getElementById('serverName').addEventListener('input',e=>{const id=document.getElementById('serverId');if(!id.dataset.touched)id.value=slugify(e.target.value)});
document.getElementById('serverId').addEventListener('input',e=>{e.target.dataset.touched='1'});
async function submitAddServer(){if(!form.reportValidity())return;const data=Object.fromEntries(new FormData(form).entries());data.minecraft_port=Number(data.minecraft_port);data.rcon_port=Number(data.rcon_port);msg.textContent='Creating server...';try{const res=await fetch('/api/servers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const json=await res.json();if(!res.ok||!json.success){msg.textContent='Error: '+(json.error||res.statusText);return}msg.textContent='Server created. Reloading...';setTimeout(()=>location.reload(),700)}catch(err){msg.textContent='Error: '+err.message}}
backdrop.addEventListener('click',e=>{if(e.target===backdrop)closeAddServerModal()});
</script>
</body>
</html>
